<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skyline — Weather Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sky" id="sky">
  <div class="celestial" id="celestial"></div>
  <div class="particles" id="particles"></div>
</div>
<main class="app" role="main">

  <header class="app-header">
    <h1 class="logo">Skyline</h1>
    <button class="unit-toggle" id="unitToggle" aria-label="Toggle temperature unit">°C</button>
  </header>
  <section class="search-box" role="search">
    <input
      type="text"
      id="cityInput"
      placeholder="Search for a city..."
      autocomplete="off"
      aria-label="City name"
    >
    <button id="locateBtn" class="icon-btn" title="Use my location" aria-label="Use my current location">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 2a1 1 0 011 1v1.06A8.004 8.004 0 0119.94 11H21a1 1 0 010 2h-1.06A8.004 8.004 0 0113 19.94V21a1 1 0 01-2 0v-1.06A8.004 8.004 0 014.06 13H3a1 1 0 010-2h1.06A8.004 8.004 0 0111 4.06V3a1 1 0 011-1zm0 4a6 6 0 100 12 6 6 0 000-12zm0 3.2a2.8 2.8 0 110 5.6 2.8 2.8 0 010-5.6z"/></svg>
    </button>
    <button id="searchBtn" class="icon-btn primary" title="Search" aria-label="Search">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 10-.7.7l.27.28v.79l5 5L20.49 19l-5-5zm-6 0a4.5 4.5 0 110-9 4.5 4.5 0 010 9z"/></svg>
    </button>
  </section>
  <div class="recent-searches" id="recentSearches" aria-label="Recent searches"></div>

  <section id="weatherDisplay" class="weather-display" aria-live="polite">
    <p class="hint">Search a city above, or use your location, to see the sky right now.</p>
  </section>

  <section id="forecastDisplay" class="forecast-display"></section>

  <footer class="app-footer">
    <span>Data by OpenWeatherMap</span>
  </footer>

</main>

</body>
<script src="config.js"></script>
<script src="script.js"></script>
</html>
